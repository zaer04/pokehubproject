<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeHub</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/pokemon-solid">

    <style>
        body {
            font-family: 'Pokemon Solid', Arial, sans-serif; /* Use the Pokemon Solid font for the entire body */
            background-color: #FFCB05; /* Yellow background */
            text-align: center;
            margin: 0;
            padding: 0;
            color: #333; /* Text color */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        .container2 {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
            color: #eee;
            font-size: 30px;
        }

        h1 {
            color: #333;
            font-size: 50px;
        }

        .buttons {
            margin-top: 20px;
        }

        .buttons a {
            display: inline-block;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin: 10px;
            font-size: 16px;
        }

        .buttons a:hover {
            background-color: #555;
        }

        .image-container {
            margin-top: 20px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 5px; /* Rounded corners for image */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PokéHub</h1>
        <div class="buttons">
            <a href="pokemon.html">Pokémon</a>
            <a href="locations.html">Locations</a>
            <a href="items.html">Items</a>
        </div>
        <div class="image-container">
            <img src="https://cdn.glitch.global/8cd70ce9-6240-4af2-b423-28a02d93a094/pngimg.com%20-%20pokemon_PNG98.png?v=1711436535782"> <!-- Replace 'pokemon-image.jpg' with the path to your image -->
        </div>
      <div class='container2'>
        <p> Welcome to the homepage!
        <p> Click on any of the buttons to get started on your search!
      </div>
      
    </div>
</body>
</html>

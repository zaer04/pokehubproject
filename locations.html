<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Locations</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/pokemon-solid">
  
    <style>
        body {
            font-family: 'Pokemon Solid', Arial, sans-serif; /* Use the Pokemon Solid font for the entire body */
            background-color: #F94C10; /* Yellow background */
            text-align: center;
            margin: 0;
            padding: 0;
            color: #333; /* Text color */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .location-info {
            margin-top: 20px;
        }

        .location-info img {
            max-width: 200px;
            height: auto;
            margin-bottom: 10px;
        }

        .search-bar {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 300px;
            padding: 10px;
            border: 2px solid #333;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"] {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pokemon Locations</h1>
        <div class="search-bar">
            <form id="searchForm">
                <input type="text" id="locationName" placeholder="Enter Location ID or Name">
                <input type="submit" value="Search">
            </form>
        </div>
          <div class="container">
        <p>
          Search for a specific location in Pokémon, or type in a number! <br>
          Use dashes in between words for a town name or location (i.e. "pallet-town, undella-town, eterna-city") <br>
          Most numbers between 1-1000 should work!
        </p>
        <div class="location-info" id="locationInfo">
            <!-- Location info will be displayed here -->
        </div>
    </div>

<script>
    document.getElementById('searchForm').addEventListener('submit', function(event) {
        event.preventDefault(); // Prevent default form submission

        const locationInput = document.getElementById('locationName').value.trim();
        if (locationInput !== '') {
            fetch(`https://pokeapi.co/api/v2/location/${locationInput}`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Location not found');
                    }
                    return response.json();
                })
                .then(data => {
                    // Fetch encounter data for each area
                    const encounterPromises = data.areas.map(area => fetch(area.url).then(response => response.json()));
                    
                    // Resolve all promises
                    Promise.all(encounterPromises)
                        .then(areasData => {
                            const locationInfo = document.getElementById('locationInfo');
                            locationInfo.innerHTML = `
                                <h2>${data.name}</h2>
                                <p>Region: ${data.region.name}</p>
                                <h3>Pokemon Encounters:</h3>
                                ${areasData.map(area => {
                                    const encounters = area.pokemon_encounters.map(encounter => `${encounter.pokemon.name} (min level ${encounter.version_details[0].encounter_details[0].min_level}, max level ${encounter.version_details[0].encounter_details[0].max_level})`);
                                    return `<p><strong>${area.name}</strong>: ${encounters.join(', ')}</p>`;
                                }).join('')}
                            `;
                        })
                        .catch(error => {
                            const locationInfo = document.getElementById('locationInfo');
                            locationInfo.innerHTML = `<p>${error.message}</p>`;
                        });
                })
                .catch(error => {
                    const locationInfo = document.getElementById('locationInfo');
                    locationInfo.innerHTML = `<p>${error.message}</p>`;
                });
        }
    });
</script>

<head>
    <style>
        body {
            font-family: 'Pokemon Solid', Arial, sans-serif; /* Use the Pokemon Solid font for the entire body */
            background-color: #F94C10; /* Yellow background */
            text-align: center;
            margin: 0;
            padding: 0;
            color: #333; /* Text color */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .return-home {
            display: inline-block;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
        }

        .return-home:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Pokemon information content goes here -->
        <a class="return-home" href="index.html">Return to Homepage</a>
    </div>
</body>
</body>
</html>

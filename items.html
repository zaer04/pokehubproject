<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Items</title>
  <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/pokemon-solid">

    <style>
        body {
            font-family: 'Pokemon Solid', Arial, sans-serif; /* Use the Pokemon Solid font for the entire body */
            background-color: #15F5BA; /* Yellow background */
            text-align: center;
            margin: 0;
            padding: 0;
            color: #333; /* Text color */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .item-info {
            margin-top: 20px;
        }

        .item-info img {
            max-width: 200px;
            height: auto;
            margin-bottom: 10px;
        }

        .search-bar {
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 300px;
            padding: 10px;
            border: 2px solid #333;
            border-radius: 5px;
            font-size: 16px;
        }

        input[type="submit"] {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pokemon Items</h1>
        <div class="search-bar">
            <form id="searchForm">
                <input type="text" id="itemName" placeholder="Enter Item ID or Name">
                <input type="submit" value="Search">
            </form>
        </div>
          <div class="container">
        <p>
          Search for a specific item in Pokémon, or type in a number! <br>
          Use dashes in between words for an item (i.e. "master-ball")
        </p>
        <div class="item-info" id="itemInfo">
            <!-- Item info will be displayed here -->
        </div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', function(event) {
            event.preventDefault(); // Prevent default form submission

            const itemName = document.getElementById('itemName').value.trim();
            if (itemName !== '') {
                fetch(`https://pokeapi.co/api/v2/item/${itemName}`)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Item not found');
                        }
                        return response.json();
                    })
                    .then(data => {
                        const itemInfo = document.getElementById('itemInfo');
                        itemInfo.innerHTML = `
                            <h2>${data.name}</h2>
                            <p>Category: ${data.category.name}</p>
                            <p>Description: ${data.effect_entries[0].effect}</p>
                            <p>Cost: ${data.cost}</p>
                        `;
                    })
                    .catch(error => {
                        const itemInfo = document.getElementById('itemInfo');
                        itemInfo.innerHTML = `<p>${error.message}</p>`;
                    });
            }
        });
    </script>
<head>
    <style>
        body {
            font-family: 'Pokemon Solid', Arial, sans-serif; /* Use the Pokemon Solid font for the entire body */
            background-color: #15F5BA; /* Yellow background */
            text-align: center;
            margin: 0;
            padding: 0;
            color: #333; /* Text color */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .return-home {
            display: inline-block;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 16px;
        }

        .return-home:hover {
            background-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Pokemon information content goes here -->
        <a class="return-home" href="index.html">Return to Homepage</a>
    </div>
</body>
</body>
</html>
